<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>MGS Master Collection Vol.2</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    font-family: 'Orbitron', sans-serif; overflow: hidden;
    background: url("background.jpg") no-repeat center center fixed;
    background-size: cover; color: gold;
}

#backgroundOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 0; }

/* Menü */
#mainMenu { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; z-index: 1001; border-bottom: 2px solid gold; box-sizing: border-box; }
#menuButtons { display: flex; gap: 10px; }
button { font-size: 14px; padding: 8px 16px; background: black; border: 2px solid gold; color: gold; cursor: pointer; border-radius: 5px; transition: 0.2s; }
button:hover { background: gold; color: black; }

/* Archiv Terminal */
#archiveModal { display: none; position: fixed; top: 80px; left: 10%; width: 80%; height: 75%; background: rgba(0,0,0,0.98); border: 2px solid gold; z-index: 2000; padding: 20px; box-sizing: border-box; text-align: center; }
.nav-list { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
#loader { display: none; margin: 40px 0; font-size: 20px; }
#loreDisplay { 
    border: 1px solid gold; padding: 20px; height: 350px; overflow-y: auto; text-align: left; 
    line-height: 1.6; background: rgba(20, 20, 0, 0.2);
}
#loreDisplay::-webkit-scrollbar { width: 8px; }
#loreDisplay::-webkit-scrollbar-thumb { background: gold; }

/* Content */
#overlay { margin-top: 100px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; z-index: 1; }
h1 { font-size: 32px; text-shadow: 0 0 10px gold; margin-bottom: 20px; }
#countdown { display: flex; gap: 20px; margin-bottom: 30px; }
.time-box { background: black; padding: 15px; border: 1px solid gold; min-width: 70px; }
.number { font-size: 36px; }
</style>
</head>

<body>
<div id="backgroundOverlay"></div>

<div id="mainMenu">
    <div id="menuButtons">
        <button onclick="toggleArchive()">▶ Codec-Archiv</button>
        <button onclick="window.location.href='mgs4quiz.html'">▶ MGS4 Quiz</button>
    </div>
    <button onclick="toggleFullscreen()">⛶ Vollbild</button>
</div>

<div id="archiveModal">
    <h2 style="letter-spacing: 3px;">--- DATABASE ACCESS ---</h2>
    <div class="nav-list" id="gameNav"></div>
    <div id="loader">Verbinde zum Codec...</div>
    <div id="loreDisplay"><p>Wähle eine Operation aus, um die Akten zu laden.</p></div>
    <button style="margin-top:20px;" onclick="toggleArchive()">[ VERBINDUNG TRENNEN ]</button>
</div>

<div id="overlay">
    <h1>METAL GEAR SOLID Master Collection</h1>
    <div id="countdown">
        <div class="time-box"><div class="number" id="days">00</div>Tage</div>
        <div class="time-box"><div class="number" id="hours">00</div>Std</div>
        <div class="time-box"><div class="number" id="minutes">00</div>Min</div>
        <div class="time-box"><div class="number" id="seconds">00</div>Sek</div>
    </div>
    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
</div>

<script>
const gameData = {
    "MG": { title: "Metal Gear", info: "Solid Snake infiltriert Outer Heaven, um den Metal Gear TX-55 zu zerstören. Er entdeckt, dass sein Mentor Big Boss der Anführer des Aufstands ist." },
    "MG2": { title: "MG2: Solid Snake", info: "Snake reist nach Zanzibar Land. Er muss Dr. Marv retten und den neuen Metal Gear D vernichten. Ein dramatisches Duell gegen Big Boss offenbart die Wahrheit über Snakes Herkunft." },
    "MGS1": { title: "MGS1", info: "Auf Shadow Moses muss Snake eine Terrorgruppe unter Führung seines Zwillings Liquid Snake stoppen. Es ist ein Kampf gegen Gene, Verrat und den Metal Gear REX." },
    "MGS2": { title: "MGS2", info: "Raiden infiltriert die Big Shell. Was als einfache Rettungsmission beginnt, wird zur Enthüllung über die Kontrolle der 'Patrioten' und die Manipulation der Gesellschaft durch Informationen." },
    "MGS3": { title: "MGS3", info: "1964: Naked Snake gegen The Boss. Ein Verrat der Regierung führt ihn tief in den Dschungel. Die Tragödie um den Shagohod markiert den Beginn der Big Boss Legende." },
    "MGS4": { title: "MGS4", info: "Old Snake kämpft gegen Liquid Ocelot in einer Welt voller PMCs. Er versucht, das System der Patrioten ein für alle Mal abzuschalten." },
    "MGS5": { title: "MGS V", info: "Venom Snake baut Diamond Dogs auf. Eine Geschichte über Rache, den Verlust der Identität und den Weg in die Finsternis." }
};

const openSound = new Audio('open.mp3');
const closeSound = new Audio('close.mp3');

const nav = document.getElementById('gameNav');
Object.keys(gameData).forEach(key => {
    const btn = document.createElement('button');
    btn.innerText = gameData[key].title;
    btn.onclick = () => {
        document.getElementById('loreDisplay').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('loreDisplay').style.display = 'block';
            document.getElementById('loreDisplay').innerHTML = `<h3>${gameData[key].title}</h3><p>${gameData[key].info}</p>`;
        }, 800);
    };
    nav.appendChild(btn);
});

function toggleArchive() {
    const m = document.getElementById('archiveModal');
    m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    (m.style.display === 'block') ? openSound.play().catch(()=>{}) : closeSound.play().catch(()=>{});
}

function updateCountdown() {
    const diff = new Date("August 27, 2026 14:00:00") - new Date();
    document.getElementById("days").innerText = String(Math.floor(diff / (1000*60*60*24))).padStart(2,'0');
    document.getElementById("hours").innerText = String(Math.floor((diff % (1000*60*60*24)) / (1000*60*60))).padStart(2,'0');
    document.getElementById("minutes").innerText = String(Math.floor((diff % (1000*60*60)) / (1000*60))).padStart(2,'0');
    document.getElementById("seconds").innerText = String(Math.floor((diff % (1000*60)) / 1000)).padStart(2,'0');
}
setInterval(updateCountdown, 1000);
function toggleFullscreen(){ !document.fullscreenElement ? document.documentElement.requestFullscreen() : document.exitFullscreen(); }
</script>
</body>
</html>
